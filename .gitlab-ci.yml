    - $TAG_ATL_BUILD_RESTART_STAGING

.atl-rollout-restart-deployment-prod: &atl-rollout-restart-deployment-prod
  stage: restart
  image: registry.infra.atlanse.ddns.net/atl/infra/client:0.0.2
  script:
    - !reference [.atl-rollout-restart-deployment, script]
    - !reference [.get_semantic_versioning_nexus, script]
    - source ./init.sh
  tags:
    - $TAG_ATL_BUILD_RESTART_PROD

#=== shopify-plugin ===
restart:pod:shopify-plugin:qa:
  <<: *atl-rollout-restart-deployment-qa
  rules:
    - if: $CI_COMMIT_BRANCH == $BRANCH_QA
      changes:
