    SERVICE: $SERVICE_MS_IMAGES
    ENV: "QA"
  tags:
    - $TAG_ATL_BUILD_MS_IMAGES

build-and-deploy:ms-cj:qa:
  <<: *atl-build-server-go
  rules:
    - if: $CI_COMMIT_BRANCH == $BRANCH_QA
      changes:
        - $DIR_SERVER/$SERVICE_MS_CJ/**/*
      when: on_success
    - when: never
  variables:
    SERVICE: $SERVICE_MS_CJ
    ENV: "QA"
  tags:
    - $TAG_ATL_BUILD_MS_CJ

build-and-deploy:ms-cj:pre:
  <<: *atl-build-server-go
  rules:
    - if: $CI_COMMIT_BRANCH == $BRANCH_STAGING
      changes:
        - $DIR_SERVER/$SERVICE_MS_CJ/**/*
      when: on_success
    - when: never
  variables:
    SERVICE: $SERVICE_MS_CJ
    ENV: "PRE"
  tags:
