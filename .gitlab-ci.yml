#=== backoffice ===

.atl-build-and-deploy-backoffice:
  script:
    - !reference [.incr_semantic_versioning_nexus, script]
    - !reference [.get_semantic_versioning_nexus, script]
    - cp card-pipeline.* $DIR_CLIENT/$SERVICE/
    - cd $DIR_CLIENT/$SERVICE/
    - sed -i "s/%version%/$VERSION_TAG/g" src/environments/environment.$BACKOFFICE_ENVIRONMENT.ts
    - cat src/environments/environment.$BACKOFFICE_ENVIRONMENT.ts
    - export NX_NO_CLOUD=true
    - 'npx nx build backoffice --configuration=$CI_COMMIT_BRANCH --outputPath="$DIR_CLIENT/$SERVICE/dist/bo" --no-cloud --skip-nx-cache'
    - docker build --rm=true --build-arg vp=$VERSION_TAG -t $TAG .
