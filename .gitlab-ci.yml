#=== SHOPIFY ===

.atl-build-and-deploy-shopify-plugin:
  script:
    - !reference [.incr_semantic_versioning_nexus, script]
    - !reference [.get_semantic_versioning_nexus, script]
    - cp card-pipeline.* $DIR_CLIENT/$SERVICE/
    - cd $DIR_CLIENT/$SERVICE/
    - docker build --rm=true --build-arg vp=$VERSION_TAG -t $TAG .
    - !reference [.docker_push_image_nexus, script]

.atl-shopify-app-deploy:
  script:
    - !reference [.incr_semantic_versioning_nexus, script]
    - !reference [.get_semantic_versioning_nexus, script]
    - cp card-pipeline.* $DIR_CLIENT/$SERVICE/
    - cd $DIR_CLIENT/$SERVICE/
    #- echo "$(eval echo \$SHOPIFY_TOML_$ENV)" > shopify.app.$ENV_SHOPIFY.toml
    - shopify app config use shopify.app.$ENV_SHOPIFY.toml
    - shopify app deploy

.atl-before-script-build-shopify-plugin: &atl-before-script-build-shopify-plugin
  image: registry.infra.atlanse.ddns.net/atl/build/angular/node/22:0.0.6
  stage: build
  before_script:
    - !reference [.init_environment_group, script]
    - echo "$(hget_config_by_group "SO-SCRIPT-TAGPEAK-SHOPIFY-PLUGIN" "value")" > init.sh
    - chmod 777 init.sh
    - sed -i 's/\r$//' ./init.sh
    - source ./init.sh -v "web"

.atl-before-script-shopify-app-deploy: &atl-before-script-shopify-app-deploy
  image: registry.infra.atlanse.ddns.net/atl/build/angular/node/22:0.0.6
  stage: manual-deploy
  before_script:
    - !reference [.init_environment_group, script]
    - echo "$(hget_config_by_group "SO-SCRIPT-TAGPEAK-SHOPIFY-PLUGIN" "value")" > init.sh
    - chmod 777 init.sh
    - sed -i 's/\r$//' ./init.sh
    - source ./init.sh -v "web"

build-and-deploy:shopify-plugin:qa:
  <<: *atl-before-script-build-shopify-plugin
  script:
    - !reference [.atl-build-and-deploy-shopify-plugin, script]
  tags:
    - $TAG_ATL_SHOPIFY_PLUGIN
  cache:
    key: "$ATL_CACHE_SHOPIFY_PLUGIN-$CI_COMMIT_BRANCH"
    paths:
      - node_modules/
  rules:
    - if: $CI_COMMIT_BRANCH == $BRANCH_QA
      changes:
        - $DIR_CLIENT/$SHOPIFY_PLUGIN/**/*
      when: on_success
    - when: never
  variables:
    SERVICE: $SHOPIFY_PLUGIN
    ENV: "QA"
    ENV_SHOPIFY: "qa"

deploy:shopify-app:qa:
  <<: *atl-before-script-shopify-app-deploy
  script:
    - !reference [.atl-shopify-app-deploy, script]
  tags:
    - $TAG_ATL_SHOPIFY_PLUGIN
  cache:
    key: "$ATL_CACHE_SHOPIFY_PLUGIN-$CI_COMMIT_BRANCH"
