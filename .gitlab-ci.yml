stages:
  - restart

variables:
  DEMO: "demo"

# Restart deploy
restart_deploy:
  stage: restart
  image: ubuntu:latest 
  before_script:
    - apt-get update -y && apt-get install -y curl unzip jq
    # Instala o 1Password CLI
    - |
      OP_VERSION="v2.30.0"
      curl -sSfo op.zip \
        "https://cache.agilebits.com/dist/1P/op2/pkg/${OP_VERSION}/op_linux_amd64_${OP_VERSION}.zip"
      unzip -o op.zip -d /usr/local/bin/
      rm op.zip
      op --version
      
      echo "before_script"

      # Autentica no 1Password
      echo $INFRA_OP_SECRET_PASSWORD | op account add --address $INFRA_OP_SECRET_ADDRESS --email $INFRA_OP_SECRET_EMAIL
      eval $(echo $INFRA_OP_SECRET_PASSWORD | op signin --account $INFRA_OP_SECRET_ADDRESS)

  script:
     - echo "script"
     - export ONE_PASSWORD_ITEM_NAME="Hostinger-Farmácia Clínica"
     - export ONE_PASSWORD_ITEM_ID=$(op item get "$ONE_PASSWORD_ITEM_NAME" --format json | jq -r '.id')
     - echo "-->$ONE_PASSWORD_ITEM_ID"
     - |
        # Busca o valor atual
        RESPONSE=$(curl -s --header "PRIVATE-TOKEN: $GITLAB_API_TOKEN" \
          "$CI_API_V4_URL/projects/$CI_PROJECT_ID/variables/$SERVICE")
        
        CURRENT=$(echo $RESPONSE | jq -r '.value')

        # Se não existe, cria com POST, senão atualiza com PUT
        if [ "$CURRENT" = "null" ] || [ -z "$CURRENT" ]; then
          NEW_VALUE=1
          curl -s --request POST \
            --header "PRIVATE-TOKEN: $GITLAB_API_TOKEN" \
            "$CI_API_V4_URL/projects/$CI_PROJECT_ID/variables" \
            --form "key=$SERVICE" \
            --form "value=$NEW_VALUE"
        else
          NEW_VALUE=$((CURRENT + 1))
          curl -s --request PUT \
            --header "PRIVATE-TOKEN: $GITLAB_API_TOKEN" \
            "$CI_API_V4_URL/projects/$CI_PROJECT_ID/variables/$SERVICE" \
            --form "value=$NEW_VALUE"
        
        echo "Valor atualizado: $CURRENT → $NEW_VALUE"

        
  variables:
    SERVICE: "teste"
  


