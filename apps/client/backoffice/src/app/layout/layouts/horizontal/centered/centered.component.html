<!-- Loading bar -->
<fuse-loading-bar></fuse-loading-bar>

<div
    class="flex w-full flex-auto justify-center bg-project-splashScreen dark:bg-card sm:p-2 md:p-4"
>
    <!-- Navigation -->
    @if (isScreenSmall) {
        <fuse-vertical-navigation
            class="dark bg-gray-900 print:hidden"
            [mode]="'over'"
            [name]="'mainNavigation'"
            [navigation]="navigation.default"
            [opened]="false"
        >
            <!-- Navigation header hook -->
            <ng-container fuseVerticalNavigationContentHeader>
                <!-- Logo -->
                <div class="flex h-20 items-center px-8 pt-6">
                    <img
                        class="w-30"
                        src="../../../../assets/images/logo/logo.svg"
                    />
                </div>
            </ng-container>
        </fuse-vertical-navigation>
    }

    <!-- Wrapper -->
    <div
        class="flex xl:min-w-360 flex-auto flex-col items-center overflow-hidden shadow-2xl dark:shadow-none sm:rounded-[40px]"
    >
        <!-- Header -->
        <div
            class="bg-card relative z-49 flex h-16 w-full flex-0 items-center px-4 dark:bg-default sm:h-20 md:px-6 print:hidden"
        >
            @if (!isScreenSmall) {
                <!-- Logo -->
                <div class="mx-2 flex items-center lg:mr-8 cursor-pointer" (click)="openTagpeak()">
                    <div class="hidden lg:flex">
                        <!-- Light version -->
                        <img
                            class="w-40 dark:hidden"
                            src="../../../../assets/images/logo/logo.svg"
                            alt="Logo image"
                        />
                        <!-- Dark version -->
                        <img
                            class="hidden w-40 dark:flex"
                            src="../../../../assets/images/logo/logo.svg"
                            alt="Logo image"
                        />
                    </div>
                    <!-- Small version -->
                    <img
                        class="flex w-40 lg:hidden"
                        src="../../../../assets/images/logo/logo.svg"
                        alt="Logo image"
                    />
                </div>


                <!-- Horizontal navigation -->
                <div class="flex justify-between w-full" *ngIf="environment.features.bugReport">
                    <span class="font-plex text-[10px] ml-[30%] 1.75xl:ml-[35%]">
                        This is a beta version, if you have any problem or question,
                        <span class="underline cursor-pointer" (click)="openReportBug()">
                            click here</span>
                    </span>

                    <fuse-horizontal-navigation
                        class="mr-2"
                        [name]="'mainNavigation'"
                        [navigation]="navigation.horizontal"
                    />
                </div>
            }
            <!-- Navigation toggle button -->
            @if (isScreenSmall) {
                <button
                    class="mr-2"
                    mat-icon-button
                    (click)="toggleNavigation('mainNavigation')"
                >
                    <mat-icon [svgIcon]="'heroicons_outline:menu'"></mat-icon>
                </button>
            }
            <!-- Components -->
            <div class="ml-auto flex items-center space-x-1 pl-2 sm:space-x-2">
                <!--<languages></languages>
                <fuse-fullscreen class="hidden md:block"></fuse-fullscreen>
                <search [appearance]="'bar'"></search>
                <shortcuts></shortcuts>
                <messages></messages>
                <notifications></notifications>-->
                <span class="px-4 py-2 text-white rounded-full text-[16px] font-plex"
                      [ngClass]="{
                    'bg-project-red' :$userLevel()?.level === MembershipLevelsEnum.base,
                    'bg-[#92959D]' : $userLevel()?.level === MembershipLevelsEnum.silver,
                    'bg-[#E18A07]' : $userLevel()?.level === MembershipLevelsEnum.gold,
                     }">
                    {{ 'membership-level.' + $userLevel()?.level | transloco }}
                </span>
                <user></user>
            </div>
        </div>

        <!-- Content -->
        <div class="bg-white flex w-full flex-auto flex-col">
            <!-- *ngIf="true" hack is required here for router-outlet to work correctly.
                 Otherwise, layout changes won't be registered and the view won't be updated! -->
            @if (true) {
                <router-outlet></router-outlet>
            }
        </div>

    </div>
</div>
