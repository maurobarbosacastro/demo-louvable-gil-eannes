
<div class="w-full px-4 my-5 lg:px-16 lg:mt-8">
    <div class="flex justify-between items-center max-h-[54px]">
        <h3 class="text-3xl">{{ 'configurations.title' | transloco }}</h3>
    </div>

    <div class="mt-16">
        @if ($tableConfig()) {
            <atl-ng-table class="custom-table table-client-withdrawals"
                          [tableConfiguration]="$tableConfig()"
                          [totalPages]="totalPages"
                          [totalSize]="totalSize"
                          [resetPaginator]="page$ | async"
                          (onActionClick)="handleActionClick($event)"
                          (onSortAndPageChange)="onSortAndPageChange($event)" />
        }
    </div>
</div>
