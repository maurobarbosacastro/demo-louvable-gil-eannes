<div class="w-full px-16 mt-8">
    <div class="flex justify-between max-h-[74px]">
        <h3 class="flex items-center justify-center">{{ 'country.countries' | transloco }}</h3>
        <button
            class="py-2.5 px-10 bg-project-licorice-500 text-white rounded  textButton flex justify-center cursor-pointer my-4"
            (click)="openEditCountryDialog()">
            {{ 'country.new-country' | transloco }}
        </button>
    </div>
    <div class="mt-16">
        <atl-ng-table *ngIf="tableConfiguration"
                      id="table"
                      [tableConfiguration]="tableConfiguration"
                      [totalPages]="total"
                      [totalSize]="totalSize"
                      [resetPaginator]="page$ | async"
                      (onActionClick)="clickTableAction($event)"
                      (onSortAndPageChange)="onSortAndPageChange($event)"
        >
        </atl-ng-table>
    </div>
</div>
