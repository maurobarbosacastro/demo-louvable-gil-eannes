<div class="flex flex-col gap-2 m-[-24px]">

    <!--    First block-->
    <div class="bg-project-brand-500 rounded-[20px]">
        <div class="flex flex-row justify-between items-center p-4">
            <button class="flex items-center gap-1 border-solid border-2 py-1 px-5 rounded border-project-licorice-500 text-[15px]"
                    (click)="closeModal()">
                <mat-icon svgIcon="arrow-left-solid" class="icon-size-3.5 text-project-licorice-500"></mat-icon>
                <span> {{ 'stores.details.dialog.back' | transloco }} </span>
            </button>

            <button (click)="goToStore()"
                    class="flex items-center bg-project-youngBlue border-solid border-2 border-project-youngBlue text-white rounded py-1 px-5 text-[15px]">
                <span> {{ 'stores.details.go-to-store' | transloco }} </span>
            </button>
        </div>

        <form [formGroup]="dialogForm" class="pt-4">
            <div class="flex flex-col p-4 gap-2">
            <span class="text-[25px] leading-[30px] text-project-licorice-500 text-justify break-words">
                {{ 'stores.details.dialog.confirm' | transloco }}
            </span>

                <div>
                    <input id="checked" type="checkbox" [formControl]="checkedControl"
                           class="w-3 h-3 text-project-licorice-500 border-solid border-2 border-project-licorice-500 rounded-md" />
                    <span class="text-[15px] leading-[20px] text-project-licorice-500 text-justify break-words">
                {{ 'stores.details.dialog.not-show' | transloco }}
            </span>
                </div>

            </div>
        </form>
    </div>

    <!--    Second block-->
    <div class="flex flex-col gap-2.5 py-5 px-4 bg-project-brand-500 rounded-[20px]">
        <div class="flex justify-between items-start h-full flex-col">
            <div class="rectangle-6 px-5 py-4 flex flex-row gap-2.5 !bg-white">
                <div class="ellipse flex justify-center items-center !bg-[#F6F3F4]">
                    <mat-icon svgIcon="chip" class="icon-size-5"></mat-icon>
                </div>
                <p class="text-wrapper-22 break-words">{{ 'stores.details.store-text' | transloco }}</p>
            </div>
        </div>

        <div class="flex justify-between items-start h-full flex-col">
            <div class="rectangle-6 px-5 py-4 flex flex-row gap-2.5 !bg-white">
                <div class="ellipse flex justify-center items-center !bg-[#F6F3F4]">
                    <mat-icon svgIcon="cookie" class="icon-size-5"></mat-icon>
                </div>
                <p class="text-wrapper-22 break-words">{{ 'stores.details.cookies-text' | transloco }}</p>
            </div>
        </div>

        <div class="flex justify-between items-start h-full flex-col">
            <div class="rectangle-6 px-5 py-4 flex flex-row gap-2.5 !bg-white">
                <div class="ellipse flex justify-center items-center !bg-[#F6F3F4]">
                    <mat-icon svgIcon="add-group" class="icon-size-5"></mat-icon>
                </div>
                <p class="text-wrapper-22 break-words">{{ 'stores.details.blockers-text' | transloco }}</p>
            </div>
        </div>

        <div class="flex justify-between items-start h-full flex-col rounded-md">
            <div class="rectangle-6 px-5 py-4 flex flex-row gap-2.5 !bg-white">
                <div class="ellipse flex justify-center items-center !bg-[#F6F3F4]">
                    <mat-icon svgIcon="shopping" class="icon-size-5"></mat-icon>
                </div>
                <p class="text-wrapper-22 break-words">{{ 'stores.details.complete-text' | transloco }}</p>
            </div>
        </div>

    </div>

</div>
