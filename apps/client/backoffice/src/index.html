<!DOCTYPE html>
<html lang="en">
    <head>
        <title>Tagpeak</title>
        <meta charset="utf-8" />
        <meta name="description"
              content="Shop with Tagpeak and earn high potential cashback on every purchase. Our unique cashback model is backed by investments in financial markets, so what you earn may grow over time. Join now!" />
        <meta
            name="keywords"
            content="HTML,CSS,Angular,Material,Material 2,Angular Components,Tailwind,Tailwind CSS,TailwindCSS, Atlanse, Atlanse.pt, Tagpeak, Investment"
        />
        <meta
            name="viewport"
            content="width=device-width, height=device-height, initial-scale=1.0, minimum-scale=1.0"

        <base href="/" />

        <!-- Favicon -->
        <link rel="icon" type="image/png" size="16x16" href="favicon-16x16.png" />
        <link rel="icon" type="image/png" size="32x32" href="favicon-32x32.png" />
        <link rel="icon" type="image/ico" size="48x48" href="favicon.ico" />
        <link rel="icon" type="image/x-icon" href="favicon.ico" />

        <!-- Fonts -->
        <link href="assets/fonts/inter/inter.css" rel="stylesheet" />

        <link href="https://fonts.gstatic.com" rel="preconnect" />
        <link
            href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:ital,wght@0,400;0,500;0,600;1,400&display=swap"
            rel="stylesheet"
        />

        <!-- Icon fonts -->
        <link
            href="https://fonts.googleapis.com/icon?family=Material+Icons"
            rel="stylesheet"
        />

        <!-- Splash screen styles -->
        <link href="assets/styles/splash-screen.css" rel="stylesheet" />

        <!-- Google Tag Manager -->
        <script>(function(w, d, s, l, i) {

        </noscript> <!-- End Google Tag Manager (noscript) -->

        <!-- Splash screen -->
        <fuse-splash-screen>
            <img src="assets/images/logo/logo.svg" alt="Brand logo" />

</html>
