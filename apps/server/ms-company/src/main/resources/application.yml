micronaut:
    http:
        services:
            images:
                urls:
                    - ${IMAGES_HOST:`http://localhost:8099`}
    router:
        static-resources:
            swagger:
                paths: classpath:META-INF/swagger
                mapping: /swagger/**
            swagger-ui:
                mapping: /swagger-ui/**
                paths: classpath:META-INF/swagger/views/swagger-ui
    application:
        name: ms-company
    server:
        cors:
            enabled: true
        port: ${COMPANY_PORT:8095}

datasources:
    default:
        url: jdbc:postgresql://${POSTGRES_HOST:localhost}:5432/${POSTGRES_DB:company}
        username: ${POSTGRES_USER:postgres}
        password: ${POSTGRES_PASSWORD:postgres}
        driverClassName: org.postgresql.Driver
        dialect: POSTGRES

jpa:
    default:
        properties:
            hibernate:
                hbm2ddl:
                    auto: update

netty:
    default:
        allocator:
            max-order: 3
