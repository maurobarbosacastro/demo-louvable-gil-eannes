micronaut:
    http:
        services:
            images:
                urls:
                    - ${IMAGES_HOST:`http://localhost:8100`}
    application:
        name: msEduquiz
    security:
        authentication: bearer
        token:
            jwt:
                enabled: true
                signatures:
                    jwks:
                        keycloak:
                            url: http://${KEYCLOAK_HOST:localhost}:${KEYCLOAK_PORT:8091}/realms/${KEYCLOAK_REALM:gof}/protocol/openid-connect/certs
        oauth2.clients.keycloak:
            grant-type: password
            client-id: ${KEYCLOAK_CLIENT_ID:CHANGE_ME_KEYCLOAK_CLIENT_ID}
            client-secret: ${KEYCLOAK_CLIENT_SECRET:CHANGE_ME_KEYCLOAK_CLIENT_SECRET}
            authorization:
                url: http://${KEYCLOAK_HOST:localhost}:${KEYCLOAK_PORT:8091}/realms/${KEYCLOAK_REALM:CHANGE_ME}/protocol/openid-connect/auth
        enabled: ${EDUQUIZ_SECURITY:false}
    server:
        port: ${EDUQUIZ_PORT:8091}
        cors:
            enabled: true
            configurations:
                ui:
                    allowed-origins:
                        - http://localhost:4200
    router:
        static-resources:
            swagger:
                paths: classpath:META-INF/swagger
                mapping: /swagger/**
            swagger-ui:
                mapping: /swagger-ui/**
                paths: classpath:META-INF/swagger/views/swagger-ui
netty:
    default:
        allocator:
            max-order: 3

datasources:
    default:
        url: jdbc:postgresql://${POSTGRES_HOST:localhost}:5432/${POSTGRES_DB:eduquiz}
        driverClassName: org.postgresql.Driver
        username: ${POSTGRES_USER:postgres}
        password: ${POSTGRES_PASSWORD:postgres}

jpa:
    default:
        properties:
            hibernate:
                hbm2ddl:
                    auto: update
                show_sql: true

liquibase:
    enabled: true
    datasources:
        default:
            change-log: 'classpath:db/liquibase-changelog.xml'
            enabled: false

files:
    directory: "./.temp/ms-eduquiz/files"
    file-type:
        image:
            directory: images
            size: 5MB
            allowed-formats: [ "image/png", "image/jpg", "image/jpeg" ]
        video:
            directory: videos
            size: 40MB
            allowed-formats: [ "video/mp4" ]
        document:
            directory: documents
            size: 5MB
            allowed-formats: [ "application/pdf" ]

