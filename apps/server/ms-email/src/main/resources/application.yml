micronaut:
    application:
        name: msEmail
    server:
        port: ${EMAIL_PORT:8093}
        cors:
            enabled: true

    router:
        static-resources:
            swagger:
                paths: classpath:META-INF/swagger
                mapping: /swagger/**
            swagger-ui:
                mapping: /swagger-ui/**
                paths: classpath:META-INF/swagger/views/swagger-ui
netty:
    default:
        allocator:
            max-order: 3
email:
    template-folder: "${EMAIL_TEMPLATE_FOLDER:mail-templates/}"
    templates:
        "EMAIL_LOREM": "${EMAIL_SMTP_PASSWORD:email-templates-lorem.html}"
        "RECOVERY_EMAIL": "${EMAIL_SMTP_PASSWORD:email-templates-recovery.html}"
    host: "${EMAIL_SMTP_HOST:smtp-mail.outlook.com}"
    port: ${EMAIL_SMTP_PORT:587}
    from: "${EMAIL_SMTP_FROM:dev.atlanse@gmail.com}"
    username: "${EMAIL_SMTP_USER:dev.atlanse@gmail.com}"
    password: "${EMAIL_SMTP_PASSWORD:xxxxxxxxxxxxxxx}"
    auth: ${EMAIL_SMTP_AUTH:true}
    sslEnable: ${EMAIL_SMTP_SSL_ENABLE:true}
    timeout: "${EMAIL_SMTP_TIMEOUT:3600}"

datasources:
    default:
        url: jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${EMAIL_DB:email}
        driverClassName: org.postgresql.Driver
        username: ${POSTGRES_USER:postgres}
        password: ${POSTGRES_PASSWORD:postgres}

jpa:
    default:
        properties:
            hibernate:
                hbm2ddl:
                    auto: update
                show_sql: true
